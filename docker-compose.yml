version: '3.8'

services:
  # 1. The Sandbox API Hub (The Judge)
  fastapi-hub:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./sandbox-api:/app
      - ./contestant_submissions:/app/contestant_submissions
      - ./infrastructure:/infrastructure  # <-- THE MISSING LINK IS RESTORED
      # CRITICAL: Docker-in-Docker mapping. 
      - /var/run/docker.sock:/var/run/docker.sock  
    command: >
      bash -c "apt-get update && apt-get install -y docker.io && 
      pip install fastapi uvicorn python-multipart && 
      uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    networks:
      - iicpc-net

  # 2. The Live Telemetry Dashboard
  dashboard:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "3000:80"
    networks:
      - iicpc-net

networks:
  iicpc-net:
    driver: bridge